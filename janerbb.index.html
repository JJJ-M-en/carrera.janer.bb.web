<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARRERA JANERBB 🏁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --red: #e8000d;
    --red-glow: #ff2030;
    --blue: #0040ff;
    --blue-glow: #00aaff;
    --gold: #ffd700;
    --dark: #05050f;
    --darker: #020208;
    --white: #ffffff;
    --silver: #c0c0c0;
    --track-bg: #0a0a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ─── SCREENS ─── */
  .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .screen.hidden { display: none; }

  /* ─── INTRO SCREEN ─── */
  #intro {
    background: radial-gradient(ellipse at center, #0a0020 0%, #000000 70%);
    overflow: hidden;
  }

  .intro-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 50%, rgba(232,0,13,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 80% 50%, rgba(0,64,255,0.15) 0%, transparent 60%);
  }

  .sparks {
    position: absolute; inset: 0; pointer-events: none;
  }

  .spark {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    animation: sparkFloat linear infinite;
  }

  @keyframes sparkFloat {
    0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 1; }
    100% { transform: translateY(-20px) translateX(var(--dx)) scale(0); opacity: 0; }
  }

  .checkered-line {
    position: absolute;
    width: 100%; height: 8px;
    background: repeating-linear-gradient(90deg, #fff 0px, #fff 20px, #000 20px, #000 40px);
    animation: moveStripe 0.5s linear infinite;
  }
  .checkered-line.top { top: 0; }
  .checkered-line.bottom { bottom: 0; }

  @keyframes moveStripe {
    0% { background-position: 0 0; }
    100% { background-position: 40px 0; }
  }

  .logo-container {
    text-align: center;
    z-index: 10;
    animation: logoEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes logoEntrance {
    0% { transform: scale(0.3) rotateY(-180deg); opacity: 0; }
    100% { transform: scale(1) rotateY(0deg); opacity: 1; }
  }

  .carrera-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 4vw, 48px);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 12px;
    text-shadow: 0 0 20px var(--blue-glow);
    margin-bottom: 5px;
  }

  .janerbb-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 9vw, 110px);
    font-weight: 900;
    background: linear-gradient(180deg, #ffffff 0%, #c0c0c0 40%, #e8000d 60%, #800010 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(232,0,13,0.8)) drop-shadow(0 0 60px rgba(232,0,13,0.4));
    line-height: 1;
    animation: pulseLogo 2s ease-in-out infinite alternate;
  }

  @keyframes pulseLogo {
    from { filter: drop-shadow(0 0 20px rgba(232,0,13,0.6)) drop-shadow(0 0 40px rgba(232,0,13,0.3)); }
    to   { filter: drop-shadow(0 0 40px rgba(232,0,13,1))   drop-shadow(0 0 80px rgba(232,0,13,0.6)); }
  }

  .stars-row {
    display: flex; justify-content: center; gap: 8px; margin: 10px 0 20px;
  }
  .star { font-size: 24px; animation: starPulse 1s ease-in-out infinite alternate; }
  .star:nth-child(2) { animation-delay: 0.1s; }
  .star:nth-child(3) { animation-delay: 0.2s; }
  .star:nth-child(4) { animation-delay: 0.3s; }
  .star:nth-child(5) { animation-delay: 0.4s; }
  @keyframes starPulse { from { opacity: 0.5; } to { opacity: 1; } }

  .intro-car {
    font-size: clamp(60px, 12vw, 120px);
    animation: carRevving 0.5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 20px rgba(255,100,0,0.8));
    margin: 10px 0;
  }
  @keyframes carRevving {
    from { transform: translateX(-3px) rotate(-1deg); }
    to   { transform: translateX(3px)  rotate(1deg);  }
  }

  .btn-play {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--dark);
    background: linear-gradient(135deg, var(--gold) 0%, #ff9900 50%, var(--gold) 100%);
    border: none;
    padding: 18px 60px;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
    box-shadow: 0 0 30px rgba(255,215,0,0.5), 0 4px 20px rgba(0,0,0,0.5);
    animation: btnPulse 1.5s ease-in-out infinite;
  }
  .btn-play::before {
    content: '';
    position: absolute; top: -50%; left: -60%; width: 40%; height: 200%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }
  @keyframes btnPulse {
    0%,100%{box-shadow:0 0 30px rgba(255,215,0,0.5),0 4px 20px rgba(0,0,0,0.5)}
    50%{box-shadow:0 0 50px rgba(255,215,0,0.9),0 4px 30px rgba(0,0,0,0.7)}
  }
  .btn-play:hover { transform: scale(1.05); }
  .btn-play:active { transform: scale(0.97); }

  .icon-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 6px;
  }
  .char-icon {
    width: clamp(130px, 28vw, 240px);
    height: clamp(130px, 28vw, 240px);
    object-fit: contain;
    border-radius: 20px;
    filter: drop-shadow(0 0 20px rgba(232,0,13,0.7)) drop-shadow(0 0 40px rgba(0,64,255,0.5));
    animation: iconFloat 3s ease-in-out infinite alternate;
  }
  .char-icon-banner {
    width: clamp(160px, 34vw, 300px);
    height: clamp(100px, 20vw, 180px);
    border-radius: 16px;
    animation-delay: 0.5s;
    filter: drop-shadow(0 0 20px rgba(0,64,255,0.7)) drop-shadow(0 0 40px rgba(232,0,13,0.5));
  }
  @keyframes iconFloat {
    from { transform: translateY(0px) scale(1); }
    to   { transform: translateY(-12px) scale(1.03); }
  }

  .high-score-display {
    margin-top: 15px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--gold);
  }

  /* ─── GAME SCREEN ─── */
  #game {
    background: var(--track-bg);
    flex-direction: column;
  }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 100;
  }

  .hud-block {
    text-align: center;
    min-width: 100px;
  }

  .hud-label {
    font-size: 10px; letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    font-family: 'Orbitron', sans-serif;
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 900;
    color: var(--white);
    text-shadow: 0 0 10px currentColor;
    line-height: 1.1;
  }

  .hud-value.score-val { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
  .hud-value.speed-val { color: var(--red-glow); text-shadow: 0 0 15px var(--red-glow); }
  .hud-value.lives-val { color: var(--red-glow); font-size: 22px; }

  /* NITRO bar */
  #nitro-bar-wrap {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    z-index: 100; text-align: center;
    width: 200px;
  }
  .nitro-label {
    font-family: 'Orbitron', sans-serif; font-size: 10px;
    letter-spacing: 3px; color: var(--blue-glow);
    margin-bottom: 4px;
  }
  #nitro-bar-bg {
    width: 100%; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(0,170,255,0.3);
  }
  #nitro-fill {
    height: 100%;
    background: linear-gradient(90deg, #0040ff, #00aaff, #00ffff);
    border-radius: 10px;
    width: 100%;
    transition: width 0.1s;
    box-shadow: 0 0 10px var(--blue-glow);
  }

  /* CANVAS */
  #gameCanvas {
    display: block;
    width: 100%; height: 100%;
  }

  /* Mobile Controls */
  #mobile-controls {
    position: absolute; bottom: 24px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 18px;
    z-index: 100;
    pointer-events: none;
  }

  .ctrl-btn {
    pointer-events: all;
    width: 74px; height: 74px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    cursor: pointer;
    touch-action: none;
    transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(255,255,255,0.3);
    transform: scale(0.88);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  /* NITRO — big center button */
  #btn-nitro {
    pointer-events: all;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, #003cff 0%, #0018aa 70%);
    border: 3px solid var(--blue-glow);
    font-size: 13px;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    touch-action: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
    box-shadow: 0 0 25px rgba(0,170,255,0.6), 0 4px 20px rgba(0,0,0,0.5);
    animation: nitroPulse 1.5s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  #btn-nitro .nitro-icon { font-size: 26px; line-height: 1; }
  #btn-nitro:active, #btn-nitro.pressed {
    transform: scale(0.88);
    background: radial-gradient(circle, #00aaff 0%, #003cff 70%);
    box-shadow: 0 0 40px rgba(0,200,255,0.9), 0 4px 20px rgba(0,0,0,0.5);
  }
  @keyframes nitroPulse {
    0%,100% { box-shadow: 0 0 20px rgba(0,170,255,0.5), 0 4px 20px rgba(0,0,0,0.5); }
    50%      { box-shadow: 0 0 40px rgba(0,200,255,0.9), 0 4px 20px rgba(0,0,0,0.5); }
  }

  /* ─── PAUSE / OVERLAY ─── */
  #pause-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 200;
    backdrop-filter: blur(10px);
  }
  #pause-overlay.hidden { display: none; }
  #pause-overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px; color: var(--gold);
    text-shadow: 0 0 30px var(--gold);
    margin-bottom: 30px;
  }

  /* ─── GAME OVER SCREEN ─── */
  #gameover {
    background: radial-gradient(ellipse at center, #1a0005 0%, #000000 70%);
    z-index: 300;
  }

  .gameover-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 8vw, 90px);
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 40px var(--red-glow), 0 0 80px var(--red-glow);
    animation: crashAnim 0.5s ease-out both;
    text-align: center;
  }
  @keyframes crashAnim {
    0% { transform: scale(3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .final-score {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 4vw, 48px);
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold);
    margin: 20px 0 5px;
    text-align: center;
  }
  .final-best {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: var(--silver);
    margin-bottom: 30px;
  }

  .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

  .btn-action {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 2px;
    padding: 14px 35px;
    border-radius: 40px;
    border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-action:hover { transform: scale(1.05); }
  .btn-action:active { transform: scale(0.96); }
  .btn-restart {
    background: linear-gradient(135deg, var(--red) 0%, #ff4400 100%);
    color: white;
    box-shadow: 0 0 25px rgba(232,0,13,0.5);
  }
  .btn-menu {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* ─── COMBO POPUP ─── */
  #combo-popup {
    position: absolute; top: 40%; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 32px; font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px var(--gold);
    pointer-events: none;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #combo-popup.show {
    animation: comboPopAnim 1s ease-out forwards;
  }
  @keyframes comboPopAnim {
    0%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.5); }
    100%{ opacity: 0; transform: translateX(-50%) translateY(-80px) scale(1); }
  }

  /* ─── LEVEL UP ─── */
  #level-popup {
    position: absolute; top: 35%; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    pointer-events: none; z-index: 150;
    opacity: 0;
  }
  #level-popup.show {
    animation: levelPopAnim 2s ease-out forwards;
  }
  @keyframes levelPopAnim {
    0%  { opacity: 0; transform: translateX(-50%) scale(0.5); }
    15% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    80% { opacity: 1; transform: translateX(-50%) scale(1); }
    100%{ opacity: 0; transform: translateX(-50%) scale(1); }
  }
  #level-popup .lv-title {
    font-size: 14px; letter-spacing: 5px;
    color: var(--blue-glow);
    text-shadow: 0 0 10px var(--blue-glow);
  }
  #level-popup .lv-num {
    font-size: 60px; font-weight: 900;
    color: var(--white);
    text-shadow: 0 0 30px var(--white);
    line-height: 1;
  }

  /* ─── PAUSE BUTTON ─── */
  #pause-btn {
    position: absolute; top: 14px; right: 20px;
    z-index: 101;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    color: white; font-size: 18px;
    width: 40px; height: 40px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #pause-btn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<!-- ══ INTRO SCREEN ══ -->
<div class="screen" id="intro">
  <div class="intro-bg"></div>
  <div class="checkered-line top"></div>
  <div class="checkered-line bottom"></div>
  <div class="sparks" id="sparks"></div>

  <div class="logo-container">
    <!-- TOP: two character icons side by side -->
    <div class="icon-row">
      <img id="icon1" class="char-icon" src="" alt="JANERBB Icon 1"/>
      <img id="icon2" class="char-icon char-icon-banner" src="" alt="JANERBB Banner"/>
    </div>
    <div class="stars-row">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
      <span class="star">⭐</span><span class="star">⭐</span>
    </div>
    <button class="btn-play" onclick="startGame()">🏁 JUGAR AHORA 🏁</button>
    <div class="high-score-display" id="intro-hs">🏆 RÉCORD: 0</div>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div class="screen hidden" id="game">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Puntos</div>
      <div class="hud-value score-val" id="hud-score">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Nivel</div>
      <div class="hud-value" id="hud-level" style="color:#00aaff;text-shadow:0 0 10px #00aaff">1</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Velocidad</div>
      <div class="hud-value speed-val" id="hud-speed">80</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Vidas</div>
      <div class="hud-value lives-val" id="hud-lives">❤️❤️❤️</div>
    </div>
  </div>

  <button id="pause-btn" onclick="togglePause()">⏸</button>

  <canvas id="gameCanvas"></canvas>

  <!-- Nitro bar -->
  <div id="nitro-bar-wrap">
    <div class="nitro-label">⚡ NITRO</div>
    <div id="nitro-bar-bg"><div id="nitro-fill"></div></div>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <!-- LEFT arrow -->
    <button class="ctrl-btn" id="btn-left"
      ontouchstart="keys.left=true" ontouchend="keys.left=false">⬅️</button>

    <!-- CENTER: NITRO -->
    <button id="btn-nitro"
      ontouchstart="keys.nitro=true" ontouchend="keys.nitro=false">
      <span class="nitro-icon">⚡</span>
      <span>NITRO</span>
    </button>

    <!-- RIGHT arrow -->
    <button class="ctrl-btn" id="btn-right"
      ontouchstart="keys.right=true" ontouchend="keys.right=false">➡️</button>
  </div>

  <!-- Combo popup -->
  <div id="combo-popup">🔥 COMBO x3!</div>

  <!-- Level popup -->
  <div id="level-popup">
    <div class="lv-title">NIVEL</div>
    <div class="lv-num" id="lv-num-text">2</div>
  </div>

  <!-- Pause overlay -->
  <div id="pause-overlay" class="hidden">
    <h2>⏸ PAUSA</h2>
    <button class="btn-action btn-restart" onclick="togglePause()" style="margin-bottom:15px">▶ CONTINUAR</button>
    <button class="btn-action btn-menu" onclick="goToMenu()">🏠 MENÚ</button>
  </div>
</div>

<!-- ══ GAME OVER SCREEN ══ -->
<div class="screen hidden" id="gameover">
  <div class="gameover-title">💥 CHOQUE! 💥</div>
  <div class="final-score">PUNTOS: <span id="final-score">0</span></div>
  <div class="final-best">🏆 RÉCORD: <span id="final-best">0</span></div>
  <div class="btn-group">
    <button class="btn-action btn-restart" onclick="startGame()">🔄 REINTENTAR</button>
    <button class="btn-action btn-menu" onclick="goToMenu()">🏠 MENÚ</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  JANERBB RACING — Complete Game Engine
// ══════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ─── Resize
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Game State
let state = {};
let animId;
let paused = false;

const keys = { left: false, right: false, brake: false, nitro: false };

// ─── Track Constants
const LANE_COUNT = 5;
let ROAD_LEFT, ROAD_RIGHT, ROAD_W, LANE_W;

function calcRoad() {
  ROAD_W     = Math.min(canvas.width * 0.85, 600);
  ROAD_LEFT  = (canvas.width - ROAD_W) / 2;
  ROAD_RIGHT = ROAD_LEFT + ROAD_W;
  LANE_W     = ROAD_W / LANE_COUNT;
}

function laneX(lane) { return ROAD_LEFT + lane * LANE_W + LANE_W / 2; }

// ─── Helpers
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ─── Local Storage
function getHS() { return parseInt(localStorage.getItem('janerbb_hs') || '0'); }
function setHS(v) { if (v > getHS()) localStorage.setItem('janerbb_hs', v); }

// ─── Particle System
class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    Object.assign(this, {x, y, vx, vy, color, life, maxLife: life, size});
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 200 * dt; // gravity
    this.life -= dt;
    return this.life > 0;
  }
  draw(ctx) {
    const a = this.life / this.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

let particles = [];

function spawnCrash(x, y) {
  const colors = ['#ff4400','#ffaa00','#ff0000','#ffffff','#ffff00'];
  for (let i = 0; i < 40; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(100, 400);
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - rand(50, 200),
      colors[randInt(0, colors.length - 1)],
      rand(0.5, 1.5),
      rand(3, 10)
    ));
  }
}

function spawnNitro(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push(new Particle(
      x + rand(-10, 10), y,
      rand(-50, 50),
      rand(-80, -200),
      Math.random() > 0.5 ? '#00aaff' : '#0040ff',
      rand(0.3, 0.7), rand(3, 7)
    ));
  }
}

// ─── Entities
class PlayerCar {
  constructor() {
    this.lane   = 2;
    this.x      = laneX(2);
    this.y      = canvas.height - 150;
    this.w      = 48;
    this.h      = 80;
    this.speed  = 0;        // km/h (display)
    this.vx     = 0;        // pixel velocity
    this.nitro  = 100;      // %
    this.invulnerable = 0;  // seconds remaining
    this.wobble = 0;
    this.emoji  = '🏎️';
  }

  update(dt) {
    calcRoad();
    const targetX = laneX(this.lane);

    // Horizontal movement
    const speed = 400;
    if (this.x < targetX - 5)      this.vx = lerp(this.vx,  speed, dt * 8);
    else if (this.x > targetX + 5) this.vx = lerp(this.vx, -speed, dt * 8);
    else { this.vx = 0; this.x = targetX; }

    this.x = clamp(this.x + this.vx * dt, ROAD_LEFT + this.w/2, ROAD_RIGHT - this.w/2);

    // Nitro
    if (keys.nitro && this.nitro > 0) {
      this.nitro = Math.max(0, this.nitro - dt * 40);
      spawnNitro(this.x, this.y + this.h/2);
      state.gameSpeed = Math.min(state.gameSpeed * 1.01, state.baseSpeed * 2.5);
    } else if (!keys.nitro) {
      this.nitro = Math.min(100, this.nitro + dt * 8);
    }

    // Speed display
    this.speed = Math.round(state.gameSpeed * 0.6 + (keys.nitro ? 60 : 0));

    if (this.invulnerable > 0) this.invulnerable -= dt;
    this.wobble += dt * 10;
  }

  draw(ctx) {
    if (this.invulnerable > 0 && Math.floor(this.invulnerable * 10) % 2 === 0) return;

    ctx.save();
    ctx.translate(this.x, this.y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(0, this.h / 2 + 10, this.w * 0.6, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Exhaust
    if (keys.nitro) {
      ctx.shadowColor = '#00aaff';
      ctx.shadowBlur = 20;
    }

    // Car body gradient
    const grad = ctx.createLinearGradient(-this.w/2, -this.h/2, this.w/2, this.h/2);
    grad.addColorStop(0, '#ff4444');
    grad.addColorStop(0.4, '#cc0000');
    grad.addColorStop(1, '#880000');
    ctx.fillStyle = grad;

    // Body
    ctx.beginPath();
    ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, [12, 12, 6, 6]);
    ctx.fill();

    // Stripe
    ctx.fillStyle = '#111';
    ctx.fillRect(-4, -this.h/2, 8, this.h);

    // Windshield
    ctx.fillStyle = 'rgba(100,180,255,0.7)';
    ctx.beginPath();
    ctx.roundRect(-this.w/2 + 6, -this.h/2 + 6, this.w - 12, 22, 5);
    ctx.fill();

    // Headlights
    ctx.fillStyle = '#00ffff';
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(-this.w/2 + 5, -this.h/2 + 4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.w/2 - 5,  -this.h/2 + 4, 5, 0, Math.PI*2); ctx.fill();

    // Taillights
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(-this.w/2 + 5, this.h/2 - 4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.w/2 - 5,  this.h/2 - 4, 5, 0, Math.PI*2); ctx.fill();

    // JANERBB label
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 7px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('JANERBB', 0, 8);

    ctx.restore();
  }

  getRect() {
    return { x: this.x - this.w/2 + 8, y: this.y - this.h/2 + 8, w: this.w - 16, h: this.h - 16 };
  }
}

class EnemyCar {
  constructor(lane, y, colorSet) {
    this.lane = lane;
    this.x    = laneX(lane);
    this.y    = y || -100;
    this.w    = 44;
    this.h    = 76;
    this.colors = colorSet || ['#333','#555','#444'];
    this.speed  = 0; // relative
    this.type   = randInt(0, 2); // 0=normal, 1=truck, 2=sport
  }

  update(dt, gameSpeed) {
    this.y += gameSpeed * dt;
    this.x = lerp(this.x, laneX(this.lane), dt * 4);
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, this.h/2+8, this.w*0.5, 7, 0, 0, Math.PI*2); ctx.fill();

    const h = this.type === 1 ? this.h * 1.3 : this.h;
    const w = this.type === 2 ? this.w * 0.85 : this.w;

    // Body
    const g = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    g.addColorStop(0, this.colors[0]);
    g.addColorStop(0.5, this.colors[1]);
    g.addColorStop(1, this.colors[2]);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(-w/2, -h/2, w, h, 8);
    ctx.fill();

    // Windshield (rear facing player)
    ctx.fillStyle = 'rgba(80,140,200,0.6)';
    ctx.beginPath();
    ctx.roundRect(-w/2 + 5, h/2 - 20, w - 10, 16, 4);
    ctx.fill();

    // Taillights
    ctx.fillStyle = '#ff2200';
    ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(-w/2 + 5, h/2 - 4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w/2 - 5,  h/2 - 4, 5, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }

  getRect() {
    const h = this.type === 1 ? this.h * 1.3 : this.h;
    return { x: this.x - this.w/2 + 6, y: this.y - h/2 + 6, w: this.w - 12, h: h - 12 };
  }
}

class Coin {
  constructor(lane, y) {
    this.lane = lane;
    this.x    = laneX(lane);
    this.y    = y || -50;
    this.r    = 14;
    this.t    = 0;
    this.taken = false;
  }

  update(dt, gameSpeed) {
    this.y += gameSpeed * dt;
    this.t += dt * 5;
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(Math.sin(this.t) * 0.3);

    const scale = Math.cos(this.t) * 0.3 + 0.7;
    ctx.scale(scale, 1);

    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(-4, -4, 2, 0, 0, this.r);
    g.addColorStop(0, '#fffde0');
    g.addColorStop(0.4, '#ffd700');
    g.addColorStop(1, '#b8860b');
    ctx.fillStyle = g;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 15;
    ctx.fill();
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', 0, 0);
    ctx.restore();
  }

  getRect() {
    return { x: this.x - this.r, y: this.y - this.r, w: this.r*2, h: this.r*2 };
  }
}

class PowerUp {
  constructor(lane, y, type) {
    this.lane = lane;
    this.x    = laneX(lane);
    this.y    = y || -50;
    this.r    = 18;
    this.t    = 0;
    this.type = type; // 'shield','nitro','slow'
  }

  update(dt, gameSpeed) {
    this.y += gameSpeed * dt;
    this.t += dt * 3;
  }

  draw(ctx) {
    const icons   = { shield: '🛡️', nitro: '⚡', slow: '❄️' };
    const colors  = { shield: '#00ff88', nitro: '#00aaff', slow: '#aaddff' };
    const color   = colors[this.type];

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.t * 0.5);

    ctx.beginPath();
    ctx.arc(0, 0, this.r + Math.sin(this.t * 2) * 3, 0, Math.PI * 2);
    ctx.fillStyle = `${color}33`;
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();

    ctx.font = `${this.r}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icons[this.type], this.x, this.y);
  }

  getRect() {
    return { x: this.x - this.r, y: this.y - this.r, w: this.r*2, h: this.r*2 };
  }
}

// ─── Rect collision
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ─── Road Rendering
class RoadRenderer {
  constructor() {
    this.offset = 0;
    this.lineSpacing = 80;
    this.bgOffset = 0;
  }

  update(dt, speed) {
    this.offset = (this.offset + speed * dt) % this.lineSpacing;
    this.bgOffset = (this.bgOffset + speed * dt * 0.3) % canvas.height;
  }

  draw(ctx) {
    calcRoad();
    const W = canvas.width, H = canvas.height;

    // Sky BG
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0015');
    skyGrad.addColorStop(0.6, '#050010');
    skyGrad.addColorStop(1, '#000000');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Side backgrounds (neon city)
    this.drawSidescape(ctx, 0, ROAD_LEFT, H, '#ff000033', '#00006644');
    this.drawSidescape(ctx, ROAD_RIGHT, W, H, '#00006644', '#ff000033');

    // Road base
    const roadGrad = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_RIGHT, 0);
    roadGrad.addColorStop(0, '#111118');
    roadGrad.addColorStop(0.5, '#1a1a22');
    roadGrad.addColorStop(1, '#111118');
    ctx.fillStyle = roadGrad;
    ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);

    // Road glow at edges
    const gLeft = ctx.createLinearGradient(ROAD_LEFT, 0, ROAD_LEFT + 30, 0);
    gLeft.addColorStop(0, 'rgba(232,0,13,0.3)');
    gLeft.addColorStop(1, 'transparent');
    ctx.fillStyle = gLeft;
    ctx.fillRect(ROAD_LEFT, 0, 30, H);

    const gRight = ctx.createLinearGradient(ROAD_RIGHT - 30, 0, ROAD_RIGHT, 0);
    gRight.addColorStop(0, 'transparent');
    gRight.addColorStop(1, 'rgba(0,64,255,0.3)');
    ctx.fillStyle = gRight;
    ctx.fillRect(ROAD_RIGHT - 30, 0, 30, H);

    // Lane dividers
    for (let l = 1; l < LANE_COUNT; l++) {
      const x = ROAD_LEFT + l * LANE_W;
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.setLineDash([40, 40]);
      ctx.lineDashOffset = -this.offset;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Road borders
    ctx.strokeStyle = '#e8000d';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#e8000d';
    ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.moveTo(ROAD_LEFT, 0); ctx.lineTo(ROAD_LEFT, H); ctx.stroke();

    ctx.strokeStyle = '#0040ff';
    ctx.shadowColor = '#0040ff';
    ctx.beginPath(); ctx.moveTo(ROAD_RIGHT, 0); ctx.lineTo(ROAD_RIGHT, H); ctx.stroke();

    ctx.shadowBlur = 0;
  }

  drawSidescape(ctx, x1, x2, H, c1, c2) {
    const g = ctx.createLinearGradient(x1, 0, x2, 0);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g;
    ctx.fillRect(x1, 0, x2 - x1, H);

    // Moving light streaks
    ctx.save();
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 5; i++) {
      const yy = ((this.bgOffset + i * (H / 5)) % H);
      const streak = ctx.createLinearGradient(x1, yy - 40, x2, yy);
      streak.addColorStop(0, 'transparent');
      streak.addColorStop(0.5, 'rgba(255,255,255,0.2)');
      streak.addColorStop(1, 'transparent');
      ctx.fillStyle = streak;
      ctx.fillRect(x1, yy - 40, x2 - x1, 40);
    }
    ctx.restore();
  }
}

// ─── init & start
function initState() {
  calcRoad();
  return {
    player: new PlayerCar(),
    enemies: [],
    coins: [],
    powerups: [],
    road: new RoadRenderer(),
    score: 0,
    lives: 3,
    level: 1,
    baseSpeed: 250,
    gameSpeed: 250,
    distance: 0,
    combo: 0,
    comboTimer: 0,
    spawnTimer: 0,
    coinTimer: 0,
    powerupTimer: 0,
    levelTimer: 0,
    running: true,
    shield: false,
    shieldTimer: 0,
    slowTimer: 0,
    lastTime: null,
    enemyColors: [
      ['#1a1a2e','#222244','#111133'],
      ['#2e1a1a','#442222','#331111'],
      ['#1a2e1a','#224422','#113311'],
      ['#2e2e1a','#444422','#333311'],
      ['#2e1a2e','#442244','#331133'],
    ]
  };
}

let st;

function startGame() {
  show('game');
  particles = [];
  paused = false;
  document.getElementById('pause-overlay').classList.add('hidden');
  st = initState();
  st.lastTime = performance.now();
  document.getElementById('intro-hs').textContent = `🏆 RÉCORD: ${getHS()}`;
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function goToMenu() {
  cancelAnimationFrame(animId);
  show('intro');
  document.getElementById('intro-hs').textContent = `🏆 RÉCORD: ${getHS()}`;
}

function show(id) {
  ['intro','game','gameover'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-overlay').classList.toggle('hidden', !paused);
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
  if (!paused) {
    st.lastTime = performance.now();
    animId = requestAnimationFrame(loop);
  }
}

// ─── Main Loop
function loop(ts) {
  if (paused) return;

  const dt = Math.min((ts - st.lastTime) / 1000, 0.05);
  st.lastTime = ts;

  update(dt);
  render();

  if (st.running) animId = requestAnimationFrame(loop);
  else showGameOver();
}

function update(dt) {
  const s = st;

  // Input: lane changes
  if (keys.left  && s.player.lane > 0)             { s.player.lane--; keys.left  = false; }
  if (keys.right && s.player.lane < LANE_COUNT - 1) { s.player.lane++; keys.right = false; }

  // Speed & level
  s.distance += s.gameSpeed * dt;
  s.levelTimer += dt;
  s.score += Math.round(s.gameSpeed * dt * 0.05);

  if (s.levelTimer > 20) {
    s.levelTimer = 0;
    s.level++;
    s.baseSpeed = Math.min(250 + s.level * 30, 600);
    showLevelUp(s.level);
  }

  // Recover speed
  if (!keys.nitro) s.gameSpeed = lerp(s.gameSpeed, s.baseSpeed, dt * 2);
  if (keys.brake)  s.gameSpeed = Math.max(s.baseSpeed * 0.5, s.gameSpeed - 200 * dt);

  // Slow power-up
  if (s.slowTimer > 0) { s.slowTimer -= dt; s.gameSpeed = Math.min(s.gameSpeed, s.baseSpeed * 0.5); }

  // Shield
  if (s.shieldTimer > 0) { s.shieldTimer -= dt; if (s.shieldTimer <= 0) s.shield = false; }

  // Combo timeout
  if (s.comboTimer > 0) { s.comboTimer -= dt; if (s.comboTimer <= 0) s.combo = 0; }

  // Spawn enemies
  s.spawnTimer -= dt;
  if (s.spawnTimer <= 0) {
    const spawnInterval = Math.max(0.8, 2.5 - s.level * 0.1);
    s.spawnTimer = rand(spawnInterval * 0.6, spawnInterval);

    const used = new Set();
    const numEnemies = Math.min(s.level < 3 ? 1 : randInt(1, 2), LANE_COUNT - 1);
    for (let i = 0; i < numEnemies; i++) {
      let lane;
      do { lane = randInt(0, LANE_COUNT - 1); } while (used.has(lane));
      used.add(lane);
      s.enemies.push(new EnemyCar(lane, -120, s.enemyColors[randInt(0, s.enemyColors.length-1)]));
    }
  }

  // Spawn coins
  s.coinTimer -= dt;
  if (s.coinTimer <= 0) {
    s.coinTimer = rand(1.5, 3);
    const coinLane = randInt(0, LANE_COUNT - 1);
    for (let c = 0; c < randInt(1, 3); c++) {
      s.coins.push(new Coin(coinLane, -60 - c * 60));
    }
  }

  // Spawn power-ups
  s.powerupTimer -= dt;
  if (s.powerupTimer <= 0) {
    s.powerupTimer = rand(8, 15);
    const types = ['shield','nitro','slow'];
    s.powerups.push(new PowerUp(randInt(0, LANE_COUNT-1), -60, types[randInt(0, 2)]));
  }

  // Update entities
  s.player.update(dt);
  s.enemies.forEach(e => e.update(dt, s.gameSpeed));
  s.coins.forEach(c => c.update(dt, s.gameSpeed));
  s.powerups.forEach(p => p.update(dt, s.gameSpeed));

  const pr = s.player.getRect();

  // Enemy collision
  for (let i = s.enemies.length - 1; i >= 0; i--) {
    const e = s.enemies[i];
    if (e.y - e.h/2 > canvas.height + 50) { s.enemies.splice(i, 1); continue; }

    if (rectsOverlap(pr, e.getRect())) {
      if (s.shield) {
        s.shield = false; s.shieldTimer = 0;
        spawnCrash(e.x, e.y);
        s.enemies.splice(i, 1);
      } else {
        s.lives--;
        s.player.invulnerable = 2;
        spawnCrash(e.x, e.y);
        s.enemies.splice(i, 1);
        s.combo = 0;
        if (s.lives <= 0) { s.running = false; return; }
      }
    }
  }

  // Coin collision
  for (let i = s.coins.length - 1; i >= 0; i--) {
    const c = s.coins[i];
    if (c.y > canvas.height + 40) { s.coins.splice(i, 1); continue; }
    if (rectsOverlap(pr, c.getRect())) {
      s.score += 10 * (s.combo > 0 ? s.combo : 1);
      s.combo++;
      s.comboTimer = 3;
      s.coins.splice(i, 1);
      if (s.combo >= 3) showCombo(s.combo);
    }
  }

  // Powerup collision
  for (let i = s.powerups.length - 1; i >= 0; i--) {
    const p = s.powerups[i];
    if (p.y > canvas.height + 40) { s.powerups.splice(i, 1); continue; }
    if (rectsOverlap(pr, p.getRect())) {
      applyPowerup(p.type);
      s.powerups.splice(i, 1);
    }
  }

  // Update particles
  particles = particles.filter(p => p.update(dt));

  // Update road
  s.road.update(dt, s.gameSpeed);

  // Update road
  s.road.update(dt, s.gameSpeed);

  // Update HUD
  document.getElementById('hud-score').textContent = s.score;
  document.getElementById('hud-level').textContent = s.level;
  document.getElementById('hud-speed').textContent = s.player.speed + ' km/h';
  document.getElementById('hud-lives').textContent = '❤️'.repeat(Math.max(0, s.lives));
  document.getElementById('nitro-fill').style.width = s.player.nitro + '%';
}

function applyPowerup(type) {
  if (type === 'shield') { st.shield = true; st.shieldTimer = 5; }
  if (type === 'nitro')  { st.player.nitro = 100; }
  if (type === 'slow')   { st.slowTimer = 5; }
}

function showCombo(n) {
  const el = document.getElementById('combo-popup');
  el.textContent = `🔥 COMBO x${n}!`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function showLevelUp(n) {
  document.getElementById('lv-num-text').textContent = n;
  const el = document.getElementById('level-popup');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ─── Render
function render() {
  const s = st;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  s.road.draw(ctx);

  // Entities (back to front)
  s.powerups.forEach(p => p.draw(ctx));
  s.coins.forEach(c => c.draw(ctx));
  s.enemies.forEach(e => e.draw(ctx));

  // Shield visual
  if (s.shield) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(s.player.x, s.player.y, 50, 0, Math.PI * 2);
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 20;
    ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 200) * 0.3;
    ctx.stroke();
    ctx.restore();
  }

  s.player.draw(ctx);

  // Particles on top
  particles.forEach(p => p.draw(ctx));

  // Speed lines (nitro effect)
  if (keys.nitro && s.player.nitro > 0) {
    ctx.save();
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 8; i++) {
      const x = rand(ROAD_LEFT, ROAD_RIGHT);
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 1;
      ctx.shadowColor = '#00aaff';
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ─── Game Over
function showGameOver() {
  setHS(st.score);
  document.getElementById('final-score').textContent = st.score;
  document.getElementById('final-best').textContent = getHS();
  cancelAnimationFrame(animId);
  show('gameover');
}

// ─── Keyboard
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { e.preventDefault(); if(st) { st.player.lane = Math.max(0, st.player.lane - 1); } }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); if(st) { st.player.lane = Math.min(LANE_COUNT-1, st.player.lane + 1); } }
  if (e.code === 'Space')      { e.preventDefault(); keys.nitro = true; }
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.brake = true;
  if (e.code === 'Escape' || e.code === 'KeyP') { if(st && st.running) togglePause(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space')      keys.nitro = false;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.brake = false;
});

// Mobile button clicks (for non-touch)
document.getElementById('btn-left').addEventListener('mousedown',  () => { if(st) { st.player.lane = Math.max(0, st.player.lane - 1); } });
document.getElementById('btn-right').addEventListener('mousedown', () => { if(st) { st.player.lane = Math.min(LANE_COUNT-1, st.player.lane + 1); } });
document.getElementById('btn-nitro').addEventListener('mousedown', () => keys.nitro = true);
document.getElementById('btn-nitro').addEventListener('mouseup',   () => keys.nitro = false);

// ─── Sparks intro
(function buildSparks() {
  const cont = document.getElementById('sparks');
  const colors = ['#ff4400','#ffaa00','#ff0000','#0040ff','#00aaff','#ffd700'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'spark';
    el.style.left     = rand(0, 100) + '%';
    el.style.bottom   = '0';
    el.style.background = colors[randInt(0, colors.length-1)];
    el.style.setProperty('--dx', rand(-100, 100) + 'px');
    el.style.animationDuration = rand(2, 5) + 's';
    el.style.animationDelay    = rand(0, 4) + 's';
    el.style.width = el.style.height = rand(2, 5) + 'px';
    cont.appendChild(el);
  }
})();

// Init high score
document.getElementById('intro-hs').textContent = `🏆 RÉCORD: ${getHS()}`;
</script>
